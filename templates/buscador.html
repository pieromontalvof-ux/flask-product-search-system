<!DOCTYPE html>
<html>
<head>
    <title>Buscador</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand">Buscador de Productos</span>
        <a href="/logout" class="btn btn-outline-light">Salir</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow p-4">
        <h3 class="mb-3">Buscar producto</h3>

        <div class="input-group mb-3">
            <input type="text" id="codigo" class="form-control" placeholder="Ingrese código: P001">
            <button class="btn btn-primary" onclick="buscar()">Buscar</button>
        </div>

        <div id="resultado"></div>

        <a href="/principal" class="btn btn-secondary mt-3">
            Regresar al panel
        </a>
    </div>
</div>

<script>
function buscar(){
    let codigo = document.getElementById("codigo").value;

    fetch("/api/buscar_producto", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({codigo: codigo})
    })
    .then(response => response.json())
    .then(data => {
        let resultado = document.getElementById("resultado");

        if(data.encontrado){
            resultado.innerHTML = `
                <div class="alert alert-success">
                    Producto encontrado correctamente
                </div>

                <table class="table table-bordered">
                    <tr><th>Código</th><td>${data.codigo}</td></tr>
                    <tr><th>Nombre</th><td>${data.nombre}</td></tr>
                    <tr><th>Descripción</th><td>${data.descripcion}</td></tr>
                    <tr><th>Precio</th><td>S/ ${data.precio}</td></tr>
                    <tr><th>Stock</th><td>${data.stock}</td></tr>
                    <tr><th>Categoría</th><td>${data.categoria}</td></tr>
                </table>
            `;
        } else {
            resultado.innerHTML = `
                <div class="alert alert-danger">
                    Producto no encontrado
                </div>
            `;
        }
    });
}
</script>

</body>
</html>
