<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            margin:0;
        }

        .container{
            width:400px;
            margin:100px auto;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 15px rgba(0,0,0,.15);
        }

        h1{
            text-align:center;
            color:#0d6efd;
        }

        label{
            font-size:18px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:10px;
            margin-bottom:20px;
            border:1px solid #ccc;
            border-radius:5px;
            box-sizing:border-box;
        }

        .btn{
            width:100%;
            padding:12px;
            background:#0d6efd;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }
    </style>

</head>

<body>

<div class="container">

    <div class="card">

        <h1>🔐 Login</h1>

        <form onsubmit="entrar(event)">

            <label>Usuario</label>
            <input type="text" required>

            <label>Contraseña</label>
            <input type="password" required>

            <button class="btn" type="submit">
                Ingresar
            </button>

        </form>

    </div>

</div>

<script>
function entrar(event){
    event.preventDefault();
    window.location.href = "principal.html";
}
</script>

</body>
</html>
